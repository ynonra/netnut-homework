# `docker compose up` brings up the whole stack with no local dependencies beyond
# Docker: backend (Node/TS/Express + Prisma), SQLite (file on a named volume,
# migrated and seeded on startup), and the React dashboard.

services:
  backend:
    build:
      context: ./backend
    environment:
      # connection_limit=1 is the correct pool shape for SQLite's single write
      # lock (docs/adr/0001): concurrent consumes queue in Prisma's pool and run
      # one at a time rather than fighting the lock. pool_timeout lets them wait.
      - DATABASE_URL=file:/data/app.db?connection_limit=1&pool_timeout=30
      - PORT=4000
    volumes:
      # Named volume holds the SQLite db (+ WAL/SHM) so data survives restarts.
      - billing-data:/data
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    environment:
      # Inside the compose network the backend is reachable by service name.
      - VITE_API_PROXY_TARGET=http://backend:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  billing-data:
