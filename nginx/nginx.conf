# Round-robin reverse proxy in front of the backend instances (issue #7).
#
# Three backend processes share ONE SQLite file on a named volume. nginx spreads
# requests across them round-robin (the default upstream policy), so a burst of
# concurrent consumes lands on DIFFERENT processes — yet the final balance is still
# exactly correct, because correctness comes from the atomic conditional UPDATE
# under SQLite's single database-wide write lock (docs/adr/0001), not from any
# in-process coordination. This makes the cross-process consistency claim something
# a reviewer can watch work.

events {}

http {
  # The serving replicas. Default load balancing is round-robin. Listing the
  # instances explicitly (rather than relying on DNS) keeps the fan-out reviewable.
  upstream backend_pool {
    server backend-1:4000;
    server backend-2:4000;
    server backend-3:4000;
  }

  server {
    listen 4000;

    location / {
      proxy_pass http://backend_pool;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Surface which backend handled the request so the cross-process fan-out is
      # observable in responses (and in the race test).
      add_header X-Upstream $upstream_addr always;
    }
  }
}
